<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Web Audio FFT</title>
<style>
  body { background: #111; color: #fff; text-align: center; font-family: sans-serif; }
  canvas { display: block; margin: 20px auto; background: #000; }
  button { padding: 12px 24px; font-size: 18px; margin-top: 20px; }
</style>
</head>
<body>
<h1>Mobile-Friendly FFT Spectrum</h1>
<button id="startBtn">Start Microphone</button>
<canvas id="fftCanvas" width="800" height="300"></canvas>

<script>
(() => {
  const startBtn = document.getElementById('startBtn');
  const canvas = document.getElementById('fftCanvas');
  const ctx = canvas.getContext('2d');

  let audioCtx, analyser, dataArray;

  function draw() {
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const barWidth = (canvas.width / dataArray.length) * 2.5;
    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {
      const barHeight = dataArray[i];
      ctx.fillStyle = `rgb(${barHeight + 100}, 50, 50)`;
      ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
  }

  async function startAudio() {
    try {
      // Create AudioContext inside user gesture
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      // Request microphone
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);

      draw();
    } catch (err) {
      console.error('Microphone error:', err);
      alert('Microphone access denied or unavailable.');
    }
  }

  // Resume audio context on mobile after gesture
  function resumeAudioContext() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  startBtn.addEventListener('click', async () => {
    await startAudio();
    resumeAudioContext();
  });

  // iOS Safari fix: resume on touch
  document.addEventListener('touchstart', resumeAudioContext, { once: true });
  document.addEventListener('pointerdown', resumeAudioContext, { once: true });
})();
</script>
</body>
</html>
